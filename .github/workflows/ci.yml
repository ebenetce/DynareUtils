env:
  DOCMAKER_GITHUB_TOKEN: ${{ secrets.DOCMAKER_GITHUB_TOKEN }}

name: Build Toolbox
on: [push]
jobs:
  build-dynare-utils:
    name: Package Toolbox
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          release: R2025b
      - name: Run script
        uses: matlab-actions/run-build@v2
        with:
          build-options: -skip test
      - name: Upload toolbox artifact
        uses: actions/upload-artifact@v4
        with:
          name: dynare-utils-mltbx
          # Adjust the path if your build writes somewhere else
          path: |
            releases/*.mltbx
            artifacts/*.mltbx
          retention-days: 14
          overwrite: true
